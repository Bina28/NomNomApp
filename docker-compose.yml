services:
  backend:
    build:
      context: ./server/server          
    ports:
      - "8080:8080"              
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=recipe_db;Username=postgres;Password=strongpassword123
      - JwtSettings__Key=${JWT_KEY}
      - SpoonacularApi__ApiKey=${SPOONACULAR_API_KEY}
      - CloudinarySettings__ApiKey=${CLOUDINARY_API_KEY}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
    depends_on:
      db:
        condition: service_healthy  

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "8081:8080"
    depends_on:
      - backend
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: recipe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recipe_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
