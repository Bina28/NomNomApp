services:
  - type: web
    name: nomnom-backend
    runtime: docker
    dockerfilePath: ./server/server/Dockerfile
    dockerContext: ./server/server
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: JwtSettings__Key
        sync: false
      - key: JwtSettings__Issuer
        value: NomNomApi
      - key: JwtSettings__Audience
        value: NomNomClient
      - key: JwtSettings__ExpiryMinutes
        value: "15"
      - key: SpoonacularApi__ApiKey
        sync: false
      - key: SpoonacularApi__BaseUrl
        value: https://api.spoonacular.com/
      - key: CloudinarySettings__CloudName
        sync: false
      - key: CloudinarySettings__ApiKey
        sync: false
      - key: CloudinarySettings__ApiSecret
        sync: false
